<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать продукт</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .page-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding: 0 4px;
        }

        .back-link {
            color: #9ca3af;
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .back-link svg {
            width: 20px;
            height: 20px;
        }

        .page-title {
            color: #9ca3af;
            font-size: 18px;
            font-weight: 500;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-size: 14px;
            color: #374151;
            transition: border-color 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #F7B557;
        }

        .form-group input::placeholder {
            color: #9ca3af;
        }

        .section-label {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 16px;
            font-weight: 400;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #F7B557;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            opacity: 0.9;
        }

        .card form p {
            margin-bottom: 20px;
        }

        .card form p label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-size: 14px;
            font-weight: 500;
        }

        .card form p input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-size: 14px;
            color: #374151;
            transition: border-color 0.2s;
            outline: none;
        }

        .card form p input:focus {
            border-color: #F7B557;
        }

        .helptext {
            display: none;
        }

        .errorlist {
            color: #ef4444;
            font-size: 12px;
            list-style: none;
            margin-top: 4px;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="container">
        <div class="page-header">
            <a href="{{ request.GET.next|default:'/' }}" class="back-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </a>
            <span class="page-title">Создать продукт</span>
        </div>

        <div class="card">
            <div class="section-label">Пищевая ценность на 100 грамм</div>

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn-submit">Сохранить продукт</button>
            </form>
        </div>
    </div>
</body>
</html>
