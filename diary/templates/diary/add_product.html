<!DOCTYPE html>
<html>
<head>
    <title>Добавить продукт</title>

    <style>
        body {
            font-family: Arial;
            background: #f6f7fb;
            padding: 20px;
        }

        .card {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #F7B557;
            border: none;
            border-radius: 8px;
        }

        a {
            display: block;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="card">

    <h2>Добавить продукт</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Сохранить продукт</button>
    </form>

    <a href="/add/">← Назад</a>

</div>

</body>
</html>
