<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .card h2 {
            color: #374151;
            font-size: 22px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .card > p {
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-size: 14px;
            color: #374151;
            transition: border-color 0.2s;
            outline: none;
            background: white;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #F7B557;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #F7B557;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            opacity: 0.9;
        }

        .card form p {
            margin-bottom: 20px;
        }

        .card form p label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-size: 14px;
            font-weight: 500;
        }

        .card form p input,
        .card form p select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-size: 14px;
            color: #374151;
            transition: border-color 0.2s;
            outline: none;
            background: white;
        }

        .card form p input:focus,
        .card form p select:focus {
            border-color: #F7B557;
        }

        .helptext {
            display: none;
        }

        .errorlist {
            color: #ef4444;
            font-size: 12px;
            list-style: none;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Заполни профиль</h2>
        <p>Мы рассчитаем твою норму калорий</p>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-submit">Сохранить</button>
        </form>
    </div>
</body>
</html>
